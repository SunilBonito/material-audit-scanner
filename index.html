<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Audit Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 480px; margin: auto; background: #f9f9f9; }
    h2 { margin-bottom: 4px; color: #1a73e8; }
    button {
      padding: 12px 18px; margin: 6px 4px;
      font-size: 16px; border-radius: 8px;
      border: none; cursor: pointer; background: #1a73e8; color: white;
      -webkit-appearance: none; width: 100%;
    }
    button.green { background: #2e7d32; }
    button.red   { background: #c62828; }
    input[type="text"] {
      width: 93%; padding: 12px; font-size: 16px;
      border-radius: 8px; border: 1px solid #ccc; margin: 6px 0;
      -webkit-appearance: none;
    }
    #status {
      font-size: 17px; font-weight: bold;
      margin: 12px 0; padding: 12px;
      border-radius: 8px; background: #e8f5e9; color: green;
      text-align: center;
    }
    #reader { width: 100%; max-width: 400px; margin-top: 12px; }
    .hidden { display: none; }
    .label { font-size: 14px; color: #555; margin-top: 10px; display: block; }
    .card {
      background: white; border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── Discontinued popup overlay ── */
    #discontinuedOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    #discontinuedOverlay.show {
      display: flex;
    }
    #discontinuedBox {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    #discontinuedBox h3 {
      color: #c62828;
      margin: 0 0 12px 0;
      font-size: 20px;
    }
    #discontinuedBox p {
      color: #333;
      font-size: 15px;
      margin: 0 0 20px 0;
      line-height: 1.5;
    }
    #discontinuedBox .erp-tag {
      background: #fce4e4;
      color: #c62828;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 16px;
    }
    #btnDismiss {
      background: #c62828;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

  <h2>📦 Material Audit Scanner</h2>

  <!-- ── Discontinued Popup ── -->
  <div id="discontinuedOverlay">
    <div id="discontinuedBox">
      <h3>⚠️ Discontinued!</h3>
      <div class="erp-tag" id="popupERP"></div>
      <p>This sample has been <b>discontinued by the vendor</b> but is still present in the Material Library.<br><br>
      🗑️ Please <b>remove it</b> from the library.</p>
      <button id="btnDismiss">Got it — Will Remove</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="card">
    <span class="label"><b>Enter Your Name:</b></span>
    <input type="text" id="auditor" placeholder="Your name"><br><br>
    <button id="btnStartAudit">Start Audit</button>
  </div>

  <!-- SCANNER UI -->
  <div id="scannerUI" class="hidden">
    <div class="card">
      <h3 id="welcome" style="margin:0 0 8px 0;"></h3>
      <div id="status">Ready to scan...</div>
    </div>

    <div class="card">
      <span class="label"><b>Comment (optional — type BEFORE scanning):</b></span>
      <input type="text" id="comments" placeholder="Add a comment for this item...">
    </div>

    <button id="startCamBtn" class="green">📷 Start Camera</button>
    <button id="stopCamBtn" class="red hidden">⛔ Stop Camera</button>

    <div id="reader"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsEr-BztVSA5tpW7QH-hOVm7yPyrEyZaBLXtC8YZdDeJP1JDirQ1OEB7QlXwPS2LcU/exec";

    let auditorName = "";
    let lastScanned = "";
    let delay = false;
    let html5QrCode = null;
    let cameraRunning = false;

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("btnStartAudit").addEventListener("click", startAudit);
      document.getElementById("startCamBtn").addEventListener("click", startCamera);
      document.getElementById("stopCamBtn").addEventListener("click", stopCamera);
      document.getElementById("btnDismiss").addEventListener("click", dismissPopup);
    });

    function startAudit() {
      auditorName = document.getElementById("auditor").value.trim();
      if (!auditorName) { alert("Please enter your name."); return; }

      document.getElementById("login").classList.add("hidden");
      document.getElementById("scannerUI").classList.remove("hidden");
      document.getElementById("welcome").innerText = "Auditor: " + auditorName;
      setStatus("⏳ Setting up audit...", "blue");

      fetch(APPS_SCRIPT_URL + "?action=markAllMissing&auditor=" + encodeURIComponent(auditorName), {
        method: "GET", mode: "no-cors"
      }).then(() => {
        setStatus("✅ Audit started — scan to mark items Available", "green");
      }).catch(() => {
        setStatus("⚠️ Could not set Missing status. Check connection.", "orange");
      });
    }

    function startCamera() {
      if (cameraRunning) return;
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        () => {}
      ).then(() => {
        cameraRunning = true;
        document.getElementById("startCamBtn").classList.add("hidden");
        document.getElementById("stopCamBtn").classList.remove("hidden");
        setStatus("📷 Camera active — point at QR/barcode", "green");
      }).catch(err => {
        setStatus("❌ Camera error: " + err, "red");
      });
    }

    function stopCamera() {
      if (html5QrCode && cameraRunning) {
        html5QrCode.stop().then(() => {
          cameraRunning = false;
          document.getElementById("stopCamBtn").classList.add("hidden");
          document.getElementById("startCamBtn").classList.remove("hidden");
          setStatus("Camera stopped.", "gray");
        });
      }
    }

    function onScanSuccess(decodedText) {
      if (delay || decodedText === lastScanned) return;
      delay = true;
      lastScanned = decodedText;

      let comments = document.getElementById("comments").value.trim();
      setStatus("⏳ Logging: " + decodedText, "blue");

      const url = APPS_SCRIPT_URL
        + "?erp="      + encodeURIComponent(decodedText)
        + "&auditor="  + encodeURIComponent(auditorName)
        + "&comments=" + encodeURIComponent(comments);

      // ── Because mode: no-cors we cannot read the response body ──
      // ── So we use a second fetch with mode: cors to get the result ──
      fetch(url, { method: "GET" })
        .then(res => res.text())
        .then(response => {
          response = response.trim();

          if (response === "DISCONTINUED") {
            // ✅ Show discontinued popup
            document.getElementById("popupERP").innerText = decodedText;
            document.getElementById("discontinuedOverlay").classList.add("show");
            setStatus("⚠️ Discontinued item scanned!", "red");
            beep();

          } else if (response === "DUPLICATE") {
            setStatus("⚠️ Already scanned: " + decodedText, "orange");

          } else if (response === "ERP_NOT_FOUND") {
            setStatus("❌ ERP not found in Master: " + decodedText, "red");

          } else {
            // SUCCESS
            setStatus("✅ Scanned: " + decodedText + (comments ? "  💬 " + comments : ""), "green");
            beep();
            document.getElementById("comments").value = "";
          }

          setTimeout(() => { delay = false; lastScanned = ""; }, 1500);
        })
        .catch(err => {
          setStatus("❌ Network error: " + err, "red");
          delay = false;
        });
    }

    function dismissPopup() {
      document.getElementById("discontinuedOverlay").classList.remove("show");
      delay = false;
      lastScanned = "";
      setStatus("📷 Camera active — point at QR/barcode", "green");
    }

    function setStatus(msg, color) {
      const el = document.getElementById("status");
      el.innerText = msg;
      el.style.color = color || "green";
    }

    function beep() {
      try {
        new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
      } catch(e) {}
    }
  </script>

</body>
</html>
